<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Add Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 450px;">
    <h2 class="mb-4" style="color: #5B9BD5;">Add New Category</h2>
    <form th:action="@{/admin/categories/add}" th:object="${category}" method="post">
        <div class="mb-3">
            <label class="form-label">Category Name</label>
            <input type="text" class="form-control" th:field="*{categoryName}" required>
        </div>
        <button type="submit" class="btn w-100" style="background-color: #5B9BD5; color: white;">Add Category</button>
    </form>
</div>

</body>
</html>
