<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Order Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5 text-center" style="max-width: 500px;">
    <h2 class="mb-3" style="color: #2ecc71;">✓ Payment Successful!</h2>
    <p class="text-muted">Thank you for your order. Here are your order details:</p>

    <div class="text-start border rounded p-3 mt-4">
        <p><strong>Order ID:</strong> <span th:text="${order.orderId}"></span></p>
        <p><strong>Total Amount:</strong> Rs. <span th:text="${order.totalAmount}"></span></p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
    </div>

    <a th:href="@{/}" class="btn mt-4" style="background-color: #5B9BD5; color: white; border-radius: 20px; padding: 10px 30px;">
        Continue Shopping
    </a>
</div>

</body>
</html>
