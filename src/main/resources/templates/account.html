<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - My Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center" style="color: #5B9BD5;">My Account</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${passwordSuccess}" class="alert alert-success" th:text="${passwordSuccess}"></div>

    <div class="mb-4">
        <p><strong>Full Name:</strong> <span th:text="${customer.fullName}"></span></p>
        <p><strong>Email:</strong> <span th:text="${customer.email}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${customer.phone}"></span></p>
        <p><strong>Address:</strong> <span th:text="${customer.address}"></span></p>
    </div>

    <div class="d-grid gap-2">
        <a th:href="@{/account/edit}" class="btn" style="background-color: #5B9BD5; color: white; border-radius: 20px;">
            Update Details
        </a>
        <a th:href="@{/account/change-password}" class="btn" style="border: 2px solid #5B9BD5; color: #5B9BD5; border-radius: 20px;">
            Change Password
        </a>
    </div>
</div>

</body>
</html>
