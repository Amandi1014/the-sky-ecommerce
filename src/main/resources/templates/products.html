<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="mb-4" style="color: #5B9BD5;">Our Products</h1>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.productName}">Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="fw-bold">Rs. <span th:text="${product.price}">0</span></p>

                    <form th:action="@{/cart/add}" method="post" class="d-flex align-items-center gap-2">
                        <input type="hidden" name="productId" th:value="${product.productId}">
                        <input type="number" name="quantity" value="1" min="1" class="form-control" style="width: 70px;">
                        <button type="submit" class="btn" style="background-color: #5B9BD5; color: white;">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
