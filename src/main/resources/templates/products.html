<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <h1 class="mb-4">Our Products</h1>
    <a href="/products-page/add" class="btn btn-dark mb-4">Add New Product</a>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.productName}">Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="fw-bold">Rs. <span th:text="${product.price}">0</span></p>
                    <a th:href="@{/products-page/delete/{id}(id=${product.productId})}" class="btn btn-danger btn-sm">Delete</a>
                    <a th:href="@{/products-page/edit/{id}(id=${product.productId})}" class="btn btn-primary btn-sm">Edit</a>
                    <form th:action="@{/cart/add}" method="post" style="display: inline;">
                        <input type="hidden" name="productId" th:value="${product.productId}">
                        <button type="submit" class="btn btn-sm" style="background-color: #5B9BD5; color: white;">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
