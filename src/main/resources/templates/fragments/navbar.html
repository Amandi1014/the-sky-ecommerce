<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg" style="background-color: #FFFFFF; border-bottom: 2px solid #5B9BD5; padding: 15px 0;">
        <div class="container">
            <a class="navbar-brand" href="/" style="color: #5B9BD5; font-weight: bold; font-size: 24px;">The Sky</a>
            <div class="collapse navbar-collapse">

                <ul class="navbar-nav me-auto" sec:authorize="!hasRole('ADMIN')">
                    <li class="nav-item"><a class="nav-link" href="/" style="color: #2C3E50;">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products-page" style="color: #2C3E50;">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="/categories-page" style="color: #2C3E50;">Categories</a></li>
                    <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" href="/account" style="color: #2C3E50;">My Account</a></li>
                </ul>

                <ul class="navbar-nav me-auto" sec:authorize="hasRole('ADMIN')">
                    <li class="nav-item"><a class="nav-link" href="/admin-dashboard" style="color: #2C3E50;">Dashboard</a></li>
                </ul>

                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">

                    <div class="dropdown me-3" sec:authorize="!hasRole('ADMIN')">
                        <a class="position-relative dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" style="color: #2C3E50;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                            </svg>
                            <span th:if="${cartItemCount != null and cartItemCount > 0}"
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill"
                                  style="background-color: #5B9BD5; font-size: 0.6rem;"
                                  th:text="${cartItemCount}">
                        </span>
                        </a>

                        <div class="dropdown-menu dropdown-menu-end p-3" style="min-width: 300px;">
                            <div th:if="${cartPreviewItems == null or #lists.isEmpty(cartPreviewItems)}" class="text-muted text-center py-2">
                                Your cart is empty.
                            </div>

                            <div th:each="item : ${cartPreviewItems}" class="d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid #eee;">
                                <div>
                                    <div th:text="${item.product.productName}" style="font-size: 14px; color: #2C3E50;"></div>
                                    <div class="text-muted" style="font-size: 12px;">
                                        Qty: <span th:text="${item.quantity}"></span>
                                    </div>
                                </div>
                                <div style="font-size: 13px; color: #2C3E50;" th:text="'Rs. ' + ${item.product.price}"></div>
                            </div>

                            <a th:if="${cartPreviewItems != null and !#lists.isEmpty(cartPreviewItems)}"
                               href="/cart" class="btn w-100 mt-2" style="background-color: #5B9BD5; color: white; border-radius: 20px;">
                                View Full Cart
                            </a>
                        </div>
                    </div>

                    <span style="color: #2C3E50; margin-right: 15px;">
                    Hello, <span sec:authentication="name">User</span>
                </span>
                    <a href="/logout" class="btn" style="background-color: #5B9BD5; color: white; border-radius: 20px; padding: 6px 20px;">Logout</a>
                </div>

                <div sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn me-2" style="background-color: #5B9BD5; color: white; border-radius: 20px; padding: 6px 20px;">Login</a>
                    <a href="/register" class="btn" style="border: 2px solid #5B9BD5; color: #5B9BD5; border-radius: 20px; padding: 6px 20px;">Register</a>
                </div>
            </div>
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
