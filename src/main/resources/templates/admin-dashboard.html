<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <h2 class="mb-4" style="color: #5B9BD5;">Admin Dashboard</h2>

    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card p-4 text-center">
                <h5>Manage Products</h5>
                <a href="/admin/products" class="btn mt-2" style="background-color: #5B9BD5; color: white;">Go to Products</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card p-4 text-center">
                <h5>Manage Categories</h5>
                <a href="/admin/categories" class="btn mt-2" style="background-color: #5B9BD5; color: white;">Go to Categories</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card p-4 text-center">
                <h5>Customers</h5>
                <a href="/admin/customers" class="btn mt-2" style="background-color: #5B9BD5; color: white;">View Customers</a>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card p-4 text-center">
                <h5>Manage Orders</h5>
                <a href="/admin/orders" class="btn mt-2" style="background-color: #5B9BD5; color: white;">Manage Orders</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
