<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5" style="max-width: 400px;">
    <h2 class="mb-4 text-center" style="color: #5B9BD5;">Login</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid email or password.
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" class="form-control" name="username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
        </div>

        <button type="submit" class="btn w-100" style="background-color: #5B9BD5; color: white; border-radius: 20px;">Login</button>
    </form>

    <p class="text-center mt-3">
        <a th:href="@{/forgot-password}" style="color: #5B9BD5;">Forgot Password?</a>
    </p>
</div>

</body>
</html>
