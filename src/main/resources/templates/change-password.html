<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>The Sky - Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5" style="max-width: 450px;">
  <h2 class="mb-4 text-center" style="color: #5B9BD5;">Change Password</h2>

  <div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>

  <form th:action="@{/account/change-password}" method="post">

    <div class="mb-3">
      <label class="form-label">Current Password</label>
      <input type="password" class="form-control" name="currentPassword" required>
    </div>

    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" class="form-control" name="newPassword" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirm New Password</label>
      <input type="password" class="form-control" name="confirmPassword" required>
    </div>

    <button type="submit" class="btn w-100 mb-2" style="background-color: #5B9BD5; color: white; border-radius: 20px;">
      Change Password
    </button>
    <a th:href="@{/account}" class="btn w-100" style="border: 1px solid #ccc; color: #2C3E50; border-radius: 20px;">
      Cancel
    </a>
  </form>
</div>

</body>
</html>
