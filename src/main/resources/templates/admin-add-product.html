<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 500px;">
    <h2 class="mb-4" style="color: #5B9BD5;">Add New Product</h2>

    <form th:action="@{/admin/products/add}" th:object="${product}" method="post">
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" class="form-control" th:field="*{productName}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" th:field="*{description}">
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock Quantity</label>
            <input type="number" class="form-control" th:field="*{stockQuantity}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category ID</label>
            <input type="number" class="form-control" th:field="*{categoryId}" required>
        </div>
        <button type="submit" class="btn w-100" style="background-color: #5B9BD5; color: white;">Add Product</button>
    </form>
</div>

</body>
</html>
