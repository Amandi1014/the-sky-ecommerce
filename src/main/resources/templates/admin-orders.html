<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Manage Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <h2 class="mb-4" style="color: #5B9BD5;">Manage Orders</h2>

    <table class="table" th:if="${not #lists.isEmpty(orders)}">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Update</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td>
                <div th:text="${customerLookup.get(order.customerId).fullName}"></div>
                <small class="text-muted" th:text="${customerLookup.get(order.customerId).email}"></small>
            </td>
            <td th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, HH:mm')}"></td>
            <td>Rs. <span th:text="${order.totalAmount}"></span></td>
            <td>
                <span th:text="${order.status}"
                      th:classappend="${order.status == 'PENDING'} ? 'text-secondary' :
                                       (${order.status} == 'PAID' ? 'text-primary' :
                                       (${order.status} == 'SHIPPED' ? 'text-warning' : 'text-success'))">
                </span>
            </td>
            <td>
                <form th:if="${order.status != 'PENDING'}" th:action="@{/admin/orders/update-status}" method="post" class="d-flex gap-2">
                    <input type="hidden" name="orderId" th:value="${order.orderId}">
                    <select name="status" class="form-select form-select-sm">
                        <option value="PAID" th:selected="${order.status == 'PAID'}">Paid</option>
                        <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">Shipped</option>
                        <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                    </select>
                    <button type="submit" class="btn btn-sm" style="background-color: #5B9BD5; color: white;">Update</button>
                </form>
                <span th:if="${order.status == 'PENDING'}" class="text-muted">Awaiting payment</span>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(orders)}">No orders yet.</p>
</div>

</body>
</html>
