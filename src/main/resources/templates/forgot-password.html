<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5" style="max-width: 450px;">
    <h2 class="mb-4 text-center" style="color: #5B9BD5;">Forgot Password</h2>

    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <button type="submit" class="btn w-100" style="background-color: #5B9BD5; color: white; border-radius: 20px;">
            Send Reset Link
        </button>
    </form>
</div>

</body>
</html>
