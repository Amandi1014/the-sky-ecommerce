<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Shipping Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center" style="color: #5B9BD5;">Shipping Details</h2>
    <p class="text-muted text-center">Confirm where this order should be delivered.</p>

    <form th:action="@{/checkout/create-session}" method="post">

        <input type="hidden" th:each="id : ${cartItemIds}" name="cartItemIds" th:value="${id}">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="shippingName" th:value="${customer.fullName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Delivery Address</label>
            <input type="text" class="form-control" name="shippingAddress" th:value="${customer.address}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contact Phone</label>
            <input type="text" class="form-control" name="shippingPhone" th:value="${customer.phone}" required>
        </div>

        <button type="submit" class="btn w-100" style="background-color: #5B9BD5; color: white; border-radius: 20px;">
            Continue to Payment
        </button>
    </form>
</div>

</body>
</html>
