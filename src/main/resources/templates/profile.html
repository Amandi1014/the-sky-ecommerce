<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - My Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 500px;">
    <h2 class="mb-4" style="color: #5B9BD5;">My Account</h2>

    <form th:action="@{/profile/update}" th:object="${customer}" method="post">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" th:field="*{fullName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" readonly style="background-color: #f0f0f0;">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" th:field="*{phone}">
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" th:field="*{address}">
        </div>

        <button type="submit" class="btn w-100 mb-2" style="background-color: #5B9BD5; color: white;">Save Changes</button>
    </form>

    <form th:action="@{/profile/delete}" method="post" onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.');">
        <button type="submit" class="btn btn-outline-danger w-100">Delete My Account</button>
    </form>
</div>

</body>
</html>
