<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <h1 class="mb-4">Categories</h1>
    <a href="/categories-page/add" class="btn btn-dark mb-4">Add New Category</a>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.categoryId}">1</td>
            <td th:text="${category.categoryName}">Name</td>
            <td>
                <a th:href="@{/categories-page/edit/{id}(id=${category.categoryId})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/categories-page/delete/{id}(id=${category.categoryId})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
