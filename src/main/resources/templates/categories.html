<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="mb-4" style="color: #5B9BD5;">Categories</h1>

    <div class="row">
        <div class="col-md-3 mb-4" th:each="category : ${categories}">
            <a th:href="@{/products-page(categoryId=${category.categoryId})}" style="text-decoration: none;">
                <div class="card p-4 text-center h-100" style="border-color: #5B9BD5;">
                    <h5 style="color: #2C3E50;" th:text="${category.categoryName}">Name</h5>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
