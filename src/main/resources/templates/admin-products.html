<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Manage Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="mb-4" style="color: #5B9BD5;">Manage Products</h1>
    <a href="/admin/products/add" class="btn mb-4" style="background-color: #5B9BD5; color: white;">Add New Product</a>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.productId}">1</td>
            <td th:text="${product.productName}">Name</td>
            <td th:text="${product.price}">0</td>
            <td th:text="${product.stockQuantity}">0</td>
            <td>
                <a th:href="@{/admin/products/edit/{id}(id=${product.productId})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/admin/products/delete/{id}(id=${product.productId})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
