<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Manage Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="mb-4" style="color: #5B9BD5;">Manage Categories</h1>
    <a href="/admin/categories/add" class="btn mb-4" style="background-color: #5B9BD5; color: white;">Add New Category</a>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.categoryId}">1</td>
            <td th:text="${category.categoryName}">Name</td>
            <td>
                <a th:href="@{/admin/categories/edit/{id}(id=${category.categoryId})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/admin/categories/delete/{id}(id=${category.categoryId})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
