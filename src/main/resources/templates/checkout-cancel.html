<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Payment Cancelled</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5 text-center" style="max-width: 500px;">
    <h2 class="mb-3" style="color: #e74c3c;">Payment Cancelled</h2>
    <p class="text-muted">Your payment was not completed. Your cart items are still saved.</p>

    <a th:href="@{/cart}" class="btn mt-4" style="background-color: #5B9BD5; color: white; border-radius: 20px; padding: 10px 30px;">
        Back to Cart
    </a>
</div>

</body>
</html>
