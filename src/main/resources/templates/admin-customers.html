<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Sky - Manage Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h1 class="mb-4" style="color: #5B9BD5;">Registered Customers</h1>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.customerId}">1</td>
            <td th:text="${customer.fullName}">Name</td>
            <td th:text="${customer.email}">Email</td>
            <td th:text="${customer.phone}">Phone</td>
            <td th:text="${customer.address}">Address</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
